const SK='mundial2026v5';
let SC={},KS={},KP={};
function save(){try{localStorage.setItem(SK,JSON.stringify({SC,KS,KP}));}catch(e){}}
function load(){
  try{const d=localStorage.getItem(SK);if(d){const p=JSON.parse(d);SC=p.SC||{};KS=p.KS||{};KP=p.KP||{};}}catch(e){}
  GORDER.forEach(g=>{if(!SC[g])SC[g]=MD[g].map(m=>({g1:m.g1,g2:m.g2}));});
}
function standings(gl){
  const teams=GN[gl],ms=MD[gl],sc=SC[gl];
  const st=teams.map((_,i)=>({i,pts:0,w:0,d:0,l:0,gf:0,gc:0,dg:0,pj:0}));
  ms.forEach((m,mi)=>{
    const a=sc[mi].g1,b=sc[mi].g2;
    if(a===null||a===undefined||b===null||b===undefined)return;
    const x=st[m.t1],y=st[m.t2];
    x.pj++;y.pj++;x.gf+=+a;x.gc+=+b;y.gf+=+b;y.gc+=+a;
    if(+a>+b){x.pts+=3;x.w++;y.l++;}else if(+a<+b){y.pts+=3;y.w++;x.l++;}else{x.pts++;y.pts++;x.d++;y.d++;}
  });
  st.forEach(s=>s.dg=s.gf-s.gc);
  st.sort((a,b)=>b.pts-a.pts||b.dg-a.dg||b.gf-a.gf);
  return st.map((s,pos)=>({...s,name:teams[s.i],pos:pos+1}));
}
function getThirds(){
  const t=[];
  GORDER.forEach(g=>{const st=standings(g);if(st.length>=3)t.push({group:g,...st[2]});});
  t.sort((a,b)=>b.pts-a.pts||b.dg-a.dg||b.gf-a.gf);
  return t;
}
function clTeam(key){
  // key: "1A","2B","3C","3r1".."3r8"
  if(!key)return '?';
  if(key.startsWith('3r')){
    const idx=parseInt(key.slice(2))-1;
    const t3=getThirds();
    return t3[idx]?t3[idx].name+' (3°'+t3[idx].group+')':'3°#'+(idx+1);
  }
  const pos=key[0],g=key.slice(1);
  const st=standings(g);
  const idx=parseInt(pos)-1;
  return st[idx]?st[idx].name:pos+'°'+g;
}
function dg(v){return(v>=0?'+':'')+v;}
function kow(id){
  const s=KS[id];if(!s||s.g1===null||s.g1===undefined||s.g2===null||s.g2===undefined)return 0;
  if(+s.g1>+s.g2)return 1;if(+s.g1<+s.g2)return 2;
  return KP[id]==='1'?1:KP[id]==='2'?2:0;
}
function koWinName(id,t1name,t2name){
  const w=kow(id);return w===1?t1name:w===2?t2name:null;
}

    m95:{s1:'m85',s2:'m86'},m96:{s1:'m87',s2:'m88'},
    m97:{s1:'m89',s2:'m90'},m98:{s1:'m91',s2:'m92'},
    m99:{s1:'m93',s2:'m94'},m100:{s1:'m95',s2:'m96'},
    m101:{s1:'m97',s2:'m98'},m102:{s1:'m99',s2:'m100'},
    m103:{s1:'m101',s2:'m102'},
  };
  const b=bracket[mid];if(!b)return null;
  const t1=getTeamFromMatch(b.s1);const t2=getTeamFromMatch(b.s2);
  return w===1?t1:t2;
}
function getTeamFromMatch(mid){
  if(mid.startsWith('m7')||mid==='m88'){return m32winner(mid)||'G.'+mid.toUpperCase();}
  const w=kow(mid);if(!w)return 'G.'+mid.toUpperCase();
  return matchWinner(mid)||'G.'+mid.toUpperCase();
}

  [['m97','M97','9 jul'],['m98','M98','9 jul'],['m99','M99','10 jul'],['m100','M100','11 jul']].forEach(([id,label,d])=>{
    const b=bkt[id];
    h+=`<div style="border-bottom:1px solid #f0f0f0"><div style="display:flex;justify-content:space-between;padding:4px 8px 0"><span class="bracket-label">${label}</span><span style="font-size:9px;color:#aaa">${d}</span></div>`;

  // Semis

  [['m101','M101','14 jul'],['m102','M102','15 jul']].forEach(([id,label,d])=>{
    const b=bkt[id];
    h+=`<div style="border-bottom:1px solid #f0f0f0"><div style="display:flex;justify-content:space-between;padding:4px 8px 0"><span class="bracket-label">${label}</span><span style="font-size:9px;color:#aaa">${d}</span></div>`;

  // Tercer puesto

  const sl2=kow('m102')===1?gt('m100'):gt('m99');
  h+=`<div class="ko-sec"><div class="ko-title" style="background:#5e6073">3er Puesto — 18 jul <span>M103-3P</span></div><div class="ko-body">`;

  // Final
  const f1=gt('m101'),f2=gt('m102');

  const fw=kow('m103');
  if(fw){
    const ch=fw===1?f1:f2;

}

function renderAll(){renderGroups();renderPos();renderR32();renderElim();}
function showPage(name,btn){
  document.querySelectorAll('.page').forEach(p=>p.classList.remove('active'));
  document.querySelectorAll('.tab').forEach(t=>t.classList.remove('active'));
  document.getElementById('page-'+name).classList.add('active');
  btn.classList.add('active');window.scrollTo(0,0);
}
load();renderAll();
